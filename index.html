<!doctype html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>교육일정 관리</title>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            margin: 0;
            background: #f5f7fb;
            font-family: Arial, 'Malgun Gothic', sans-serif;
            color: #111827
        }

        .app {
            max-width: 1500px;
            margin: auto;
            padding: 22px
        }

        .bar {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            background: white;
            border: 1px solid #d9dce3;
            border-radius: 18px;
            padding: 14px 18px;
            position: sticky;
            top: 0;
            z-index: 5;
            box-shadow: 0 8px 22px #0001
        }

        .left,
        .right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap
        }

        h1 {
            min-width: 160px;
            text-align: center;
            margin: 0;
            font-size: 26px
        }

        button,
        input,
        select,
        textarea {
            font: inherit
        }

        button {
            border: 1px solid #d9dce3;
            background: white;
            border-radius: 10px;
            padding: 9px 12px;
            cursor: pointer
        }

        .primary {
            background: #1d4ed8;
            color: white
        }

        .nav {
            font-size: 20px;
            font-weight: bold;
            width: 42px
        }

        .status {
            font-size: 12px;
            color: #6b7280;
            border: 1px solid #d9dce3;
            border-radius: 999px;
            padding: 4px 8px
        }

        .cal {
            margin-top: 16px;
            background: white;
            border: 1px solid #d9dce3;
            border-radius: 18px;
            overflow: hidden
        }

        .week,
        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr)
        }

        .w {
            font-weight: bold;
            text-align: center;
            background: #f8fafc;
            border-right: 1px solid #d9dce3;
            border-bottom: 1px solid #d9dce3;
            padding: 12px
        }

        .w:first-child {
            color: #dc2626
        }

        .w:last-child {
            color: #0284c7;
            border-right: 0
        }

        .day {
            min-height: 145px;
            border-right: 1px solid #d9dce3;
            border-bottom: 1px solid #d9dce3;
            padding: 8px;
            background: white
        }

        .day:nth-child(7n) {
            border-right: 0
        }

        .other {
            background: #f9fafb;
            color: #9ca3af
        }

        .datebar {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 6px
        }

        .holidayDate .datebar span {
            color: #dc2626
        }

        .today .datebar span {
            background: #111827;
            color: white !important;
            border-radius: 999px;
            padding: 3px 8px
        }

        .event {
            margin: 4px 0;
            padding: 6px 7px;
            border-radius: 7px;
            border: 1px solid #d1d5db;
            line-height: 1.25;
            cursor: pointer;
            word-break: keep-all
        }

        .system {
            cursor: default;
            border-style: dashed
        }

        .t {
            font-size: 12.5px;
            font-weight: bold
        }

        .m {
            font-size: 11px;
            opacity: .85
        }

        .badge {
            font-size: 10px;
            border: 1px solid #0001;
            border-radius: 999px;
            padding: 1px 5px;
            margin-right: 4px;
            background: #fff9
        }

        .hint {
            color: #6b7280;
            font-size: 13px;
            margin-top: 10px
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: #0f172a73;
            align-items: center;
            justify-content: center;
            z-index: 20;
            padding: 20px
        }

        .modal.open {
            display: flex
        }

        .panel {
            width: min(660px, 100%);
            background: white;
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 25px 70px #0004
        }

        label {
            display: block;
            font-weight: bold;
            font-size: 13px;
            margin: 10px 0 5px
        }

        .field {
            width: 100%;
            border: 1px solid #d9dce3;
            border-radius: 10px;
            padding: 10px;
            box-sizing: border-box
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px
        }

        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 16px
        }

        .danger {
            color: #b91c1c
        }

        @media(max-width:900px) {

            .week,
            .grid {
                min-width: 980px
            }

            .cal {
                overflow: auto
            }

            .row {
                grid-template-columns: 1fr
            }

            .day {
                min-height: 125px
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="bar">
            <div class="left"><button class="nav" id="prev">&lt;</button>
                <h1 id="ym"></h1><button class="nav" id="next">&gt;</button><input type="month" id="picker"><button
                    id="today">오늘</button><span class="status" id="status">저장소 확인 중</span>
            </div>
            <div class="right"><input id="q" type="search" placeholder="교육명/담당자/장소 검색"><select id="cat">
                    <option value="">전체</option>
                    <option value="training">교육</option>
                    <option value="company_issue">회사 이슈</option>
                    <option value="holiday">공휴일</option>
                    <option value="etc">기타</option>
                </select><button id="xls">엑셀 다운로드</button><button id="csv">CSV</button><button class="primary"
                    id="add">일정 추가</button></div>
        </div>
        <div class="hint">대한민국 공휴일은 자동 표시됩니다. Supabase를 연결하면 팀원들과 같은 DB를 공유합니다.</div>
        <div class="cal">
            <div class="week">
                <div class="w">SUN</div>
                <div class="w">MON</div>
                <div class="w">TUE</div>
                <div class="w">WED</div>
                <div class="w">THU</div>
                <div class="w">FRI</div>
                <div class="w">SAT</div>
            </div>
            <div class="grid" id="grid"></div>
        </div>
    </div>
    <div class="modal" id="modal">
        <div class="panel">
            <h2 id="mt">일정 편집</h2><input type="hidden" id="id"><label>날짜</label><input class="field" type="date"
                id="d"><label>교육명/이슈</label><input class="field" id="title">
            <div class="row">
                <div><label>담당자</label><input class="field" id="owner"></div>
                <div><label>장소</label><input class="field" id="place"></div>
                <div><label>구분</label><select class="field" id="category">
                        <option value="training">교육</option>
                        <option value="company_issue">회사 이슈</option>
                        <option value="etc">기타</option>
                    </select></div>
            </div>
            <div class="row">
                <div><label>배경색</label><input class="field" type="color" id="bg"></div>
                <div><label>글자색</label><input class="field" type="color" id="fc"></div>
                <div><label>테두리색</label><input class="field" type="color" id="bd"></div>
            </div><label>메모</label><textarea class="field" id="memo" rows="3"></textarea>
            <div class="actions"><button class="danger" id="del">삭제</button>
                <div><button id="cancel">취소</button><button class="primary" id="save">저장</button></div>
            </div>
        </div>
    </div>
    <script>let events = [], holidays = {}, cur = new Date(), db = null, useDb = false; cur.setDate(1); const $ = x => document.getElementById(x), pad = n => String(n).padStart(2, '0'), key = d => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`, esc = s => String(s || '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m])); function lab(c) { return c === 'training' ? '교육' : c === 'company_issue' ? '회사' : c === 'holiday' ? '공휴일' : '기타' } function norm(r) { return { id: r.id || crypto.randomUUID(), date: r.date, title: r.title || '', owner: r.owner || '', place: r.place || '', category: r.category || 'training', bg_color: r.bg_color || '#fff', font_color: r.font_color || '#111827', border_color: r.border_color || '#d1d5db', memo: r.memo || '' } } async function init() { let init = []; try { init = await fetch('initial_events.json').then(r => r.json()) } catch (e) { } let c = window.APP_CONFIG || {}; useDb = !!(c.USE_SUPABASE && c.SUPABASE_URL && c.SUPABASE_ANON_KEY && window.supabase); if (useDb) { db = window.supabase.createClient(c.SUPABASE_URL, c.SUPABASE_ANON_KEY); $('status').textContent = 'Supabase 연결'; await loadDb(); db.channel('schedules').on('postgres_changes', { event: '*', schema: 'public', table: 'schedules' }, async () => { await loadDb(); render() }).subscribe() } else { $('status').textContent = '내 브라우저 저장'; events = JSON.parse(localStorage.getItem('trainingEvents') || JSON.stringify(init)).map(norm) } render() } async function loadDb() { let { data, error } = await db.from('schedules').select('*').order('date'); if (error) { alert(error.message); return } events = (data || []).map(norm) } function saveLocal() { localStorage.setItem('trainingEvents', JSON.stringify(events)) } async function loadHol(y) { if (holidays[y]) return; holidays[y] = {}; try { let r = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${y}/KR`); if (r.ok) (await r.json()).forEach(h => { holidays[y][h.date] = holidays[y][h.date] || []; holidays[y][h.date].push(h.localName || h.name) }) } catch (e) { } if (!Object.keys(holidays[y]).length) [['01-01', '1월 1일'], ['03-01', '3·1절'], ['05-05', '어린이날'], ['06-06', '현충일'], ['08-15', '광복절'], ['10-03', '개천절'], ['10-09', '한글날'], ['12-25', '기독탄신일']].forEach(x => holidays[y][`${y}-${x[0]}`] = [x[1]]) } function hol(dk) { let y = +dk.slice(0, 4); return (holidays[y]?.[dk] || []).map(n => ({ id: 'h' + dk + n, date: dk, title: n, category: 'holiday', bg_color: '#fff5f5', font_color: '#dc2626', border_color: '#fca5a5', system: true })) } async function render() { await loadHol(cur.getFullYear()); let y = cur.getFullYear(), m = cur.getMonth(); $('ym').textContent = `${y}-${pad(m + 1)}`; $('picker').value = `${y}-${pad(m + 1)}`; let first = new Date(y, m, 1), start = new Date(first); start.setDate(start.getDate() - start.getDay()); let last = new Date(y, m + 1, 0), end = new Date(last); end.setDate(end.getDate() + 6 - end.getDay()); let q = $('q').value.toLowerCase(), cat = $('cat').value, today = key(new Date()), html = ''; for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) { let dk = key(d), arr = [...hol(dk), ...events.filter(e => e.date === dk)]; if (cat) arr = arr.filter(e => e.category === cat); if (q) arr = arr.filter(e => [e.title, e.owner, e.place, e.memo].join(' ').toLowerCase().includes(q)); html += `<div class="day ${d.getMonth() != m ? 'other' : ''} ${dk === today ? 'today' : ''} ${hol(dk).length ? 'holidayDate' : ''}"><div class="datebar"><span>${d.getDate()}</span><button onclick="openNew('${dk}')">＋</button></div>`; arr.forEach(e => html += `<div class="event ${e.system ? 'system' : ''}" ${e.system ? '' : 'onclick="openEdit(\'' + e.id + '\')"'} style="background:${e.bg_color};color:${e.font_color};border-color:${e.border_color}"><div class="t"><span class="badge">${lab(e.category)}</span>${esc(e.title)}</div><div class="m">${esc(e.owner || '')}${e.owner && e.place ? ' · ' : ''}${esc(e.place || '')}</div></div>`); html += '</div>' } $('grid').innerHTML = html } function openNew(dk) { $('mt').textContent = '일정 추가'; $('id').value = ''; $('d').value = dk; $('title').value = ''; $('owner').value = ''; $('place').value = ''; $('category').value = 'training'; $('bg').value = '#CAEDFB'; $('fc').value = '#111827'; $('bd').value = '#D1D5DB'; $('memo').value = ''; $('del').style.visibility = 'hidden'; $('modal').classList.add('open') } function openEdit(id) { let e = events.find(x => x.id === id); if (!e) return; $('mt').textContent = '일정 편집'; $('id').value = e.id; $('d').value = e.date; $('title').value = e.title; $('owner').value = e.owner; $('place').value = e.place; $('category').value = e.category; $('bg').value = e.bg_color; $('fc').value = e.font_color; $('bd').value = e.border_color; $('memo').value = e.memo; $('del').style.visibility = 'visible'; $('modal').classList.add('open') } async function save() { let id = $('id').value, e = norm({ id: id || crypto.randomUUID(), date: $('d').value, title: $('title').value.trim(), owner: $('owner').value.trim(), place: $('place').value.trim(), category: $('category').value, bg_color: $('bg').value, font_color: $('fc').value, border_color: $('bd').value, memo: $('memo').value.trim() }); if (!e.date || !e.title) { alert('날짜와 제목 필수'); return } if (useDb) { let p = { date: e.date, title: e.title, owner: e.owner, place: e.place, category: e.category, bg_color: e.bg_color, font_color: e.font_color, border_color: e.border_color, memo: e.memo }; let r = id ? await db.from('schedules').update(p).eq('id', id) : await db.from('schedules').insert(p); if (r.error) { alert(r.error.message); return } await loadDb() } else { let i = events.findIndex(x => x.id === e.id); i >= 0 ? events[i] = e : events.push(e); saveLocal() } close(); cur = new Date(e.date + 'T00:00:00'); cur.setDate(1); render() } async function del() { let id = $('id').value; if (useDb) { let r = await db.from('schedules').delete().eq('id', id); if (r.error) { alert(r.error.message); return } await loadDb() } else { events = events.filter(x => x.id !== id); saveLocal() } close(); render() } function close() { $('modal').classList.remove('open') } function rows() { let y = cur.getFullYear(), m = cur.getMonth(), out = []; for (let d = new Date(y, m, 1); d <= new Date(y, m + 1, 0); d.setDate(d.getDate() + 1)) { let dk = key(d); out.push(...hol(dk), ...events.filter(e => e.date === dk)) } return out } function dl(name, content, type) { let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([content], { type })); a.download = name; a.click() } function csv() { let a = [['날짜', '구분', '제목', '담당자', '장소', '메모'], ...rows().map(r => [r.date, lab(r.category), r.title, r.owner || '', r.place || '', r.memo || ''])]; dl(`교육일정_${$('ym').textContent}.csv`, '\ufeff' + a.map(r => r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',')).join('\n'), 'text/csv') } function xls() { let t = '<html><meta charset="utf-8"><table border=1><tr><th>날짜</th><th>구분</th><th>제목</th><th>담당자</th><th>장소</th><th>메모</th></tr>'; rows().forEach(r => t += `<tr><td>${r.date}</td><td>${lab(r.category)}</td><td style="background:${r.bg_color};color:${r.font_color}">${esc(r.title)}</td><td>${esc(r.owner || '')}</td><td>${esc(r.place || '')}</td><td>${esc(r.memo || '')}</td></tr>`); dl(`교육일정_${$('ym').textContent}.xls`, t + '</table>', 'application/vnd.ms-excel') } $('prev').onclick = () => { cur.setMonth(cur.getMonth() - 1); cur.setDate(1); render() }; $('next').onclick = () => { cur.setMonth(cur.getMonth() + 1); cur.setDate(1); render() }; $('picker').onchange = e => { let [y, m] = e.target.value.split('-').map(Number); cur = new Date(y, m - 1, 1); render() }; $('today').onclick = () => { cur = new Date(); cur.setDate(1); render() }; $('q').oninput = render; $('cat').onchange = render; $('add').onclick = () => openNew(key(new Date(cur.getFullYear(), cur.getMonth(), 1))); $('save').onclick = save; $('del').onclick = del; $('cancel').onclick = close; $('csv').onclick = csv; $('xls').onclick = xls; $('modal').onclick = e => { if (e.target.id === 'modal') close() }; init();</script>
</body>

</html>
