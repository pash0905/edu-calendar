<!doctype html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>교육일정 관리</title>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            margin: 0;
            background: #f5f7fb;
            font-family: Arial, 'Malgun Gothic', sans-serif;
            color: #111827
        }

        .app {
            max-width: 1500px;
            margin: auto;
            padding: 22px
        }

        .bar {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            background: white;
            border: 1px solid #d9dce3;
            border-radius: 18px;
            padding: 14px 18px;
            position: sticky;
            top: 0;
            z-index: 5;
            box-shadow: 0 8px 22px #0001
        }

        .left,
        .right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap
        }

        h1 {
            min-width: 160px;
            text-align: center;
            margin: 0;
            font-size: 26px
        }

        button,
        input,
        select,
        textarea {
            font: inherit
        }

        button {
            border: 1px solid #d9dce3;
            background: white;
            border-radius: 10px;
            padding: 9px 12px;
            cursor: pointer
        }

        .primary {
            background: #1d4ed8;
            color: white
        }

        .nav {
            font-size: 20px;
            font-weight: bold;
            width: 42px
        }

        .status {
            font-size: 12px;
            color: #6b7280;
            border: 1px solid #d9dce3;
            border-radius: 999px;
            padding: 4px 8px
        }

        .hint {
            color: #6b7280;
            font-size: 13px;
            margin-top: 10px
        }

        .cal {
            margin-top: 16px;
            background: white;
            border: 1px solid #d9dce3;
            border-radius: 18px;
            overflow: hidden
        }

        .week,
        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr)
        }

        .w {
            font-weight: bold;
            text-align: center;
            background: #f8fafc;
            border-right: 1px solid #d9dce3;
            border-bottom: 1px solid #d9dce3;
            padding: 12px
        }

        .w:first-child {
            color: #dc2626
        }

        .w:last-child {
            color: #0284c7;
            border-right: 0
        }

        .day {
            min-height: 145px;
            border-right: 1px solid #d9dce3;
            border-bottom: 1px solid #d9dce3;
            padding: 8px;
            background: white
        }

        .day:nth-child(7n) {
            border-right: 0
        }

        .other {
            background: #f9fafb;
            color: #9ca3af
        }

        .datebar {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 6px
        }

        .holidayDate .datebar span {
            color: #dc2626
        }

        .today .datebar span {
            background: #111827;
            color: white !important;
            border-radius: 999px;
            padding: 3px 8px
        }

        .event {
            margin: 4px 0;
            padding: 6px 7px;
            border-radius: 7px;
            border: 1px solid #d1d5db;
            line-height: 1.25;
            cursor: pointer;
            word-break: keep-all;
            min-height: 38px;
            box-sizing: border-box
        }

        .event.spacer {
            visibility: hidden;
            pointer-events: none
        }

        .system {
            cursor: default;
            border-style: dashed
        }

        .t {
            font-size: 12.5px;
            font-weight: bold
        }

        .m {
            font-size: 11px;
            opacity: .85;
            margin-top: 2px
        }

        .badge {
            font-size: 10px;
            border: 1px solid #0001;
            border-radius: 999px;
            padding: 1px 5px;
            margin-right: 4px;
            background: #fff9
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: #0f172a73;
            align-items: center;
            justify-content: center;
            z-index: 20;
            padding: 20px
        }

        .modal.open {
            display: flex
        }

        .panel {
            width: min(780px, 100%);
            background: white;
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 25px 70px #0004;
            max-height: 92vh;
            overflow: auto
        }

        label {
            display: block;
            font-weight: bold;
            font-size: 13px;
            margin: 10px 0 5px
        }

        .field {
            width: 100%;
            border: 1px solid #d9dce3;
            border-radius: 10px;
            padding: 10px;
            box-sizing: border-box;
            background: white
        }

        .dateRow {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px
        }

        .mainRow {
            display: grid;
            grid-template-columns: 1.05fr 1.55fr 1fr;
            gap: 10px;
            align-items: end
        }

        .subRow {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            align-items: end
        }

        .colorRow {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px
        }

        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 16px
        }

        .danger {
            color: #b91c1c
        }

        .modeHint {
            font-size: 12px;
            color: #6b7280;
            margin-top: 8px
        }

        @media(max-width:900px) {

            .app {
                padding: 8px;
            }

            /* 상단 박스 전체 축소 */
            .bar {
                position: static;
                padding: 10px;
                gap: 8px;
                border-radius: 14px;
                box-shadow: 0 4px 12px #0001;
            }

            /* 상단 1줄: < 2026-07 > 오늘 */
            .left {
                width: 100%;
                display: grid;
                grid-template-columns: 38px 1fr 38px 58px;
                gap: 6px;
                align-items: center;
            }

            #prev {
                grid-column: 1;
                grid-row: 1;
            }

            #ym {
                grid-column: 2;
                grid-row: 1;
                font-size: 22px;
                min-width: 0;
                text-align: center;
            }

            #next {
                grid-column: 3;
                grid-row: 1;
            }

            #today {
                grid-column: 4;
                grid-row: 1;
                width: 100%;
                padding: 8px 4px;
                font-size: 13px;
            }

            .nav {
                width: 38px;
                height: 38px;
                padding: 0;
                font-size: 18px;
            }

            /* 모바일에서는 월 선택, Supabase 상태 숨김 */
            #picker,
            #status {
                display: none;
            }

            /* 상단 2줄: 검색창 + 일정 추가 */
            .right {
                width: 100%;
                display: grid;
                grid-template-columns: 1fr 96px;
                gap: 6px;
                align-items: center;
            }

            #q {
                grid-column: 1;
                grid-row: 1;
                width: 100%;
                box-sizing: border-box;
                font-size: 13px;
                padding: 8px;
            }

            #add {
                grid-column: 2;
                grid-row: 1;
                padding: 9px 4px;
                font-size: 13px;
            }

            /* 모바일에서는 필터/다운로드 버튼 숨김 */
            #cat,
            #xls,
            #csv {
                display: none;
            }

            .hint {
                display: none;
            }

            /* 달력 폭 맞춤: 요일과 날짜 칸 정렬 */
            .cal {
                overflow: visible;
                border-radius: 12px;
                margin-top: 8px;
            }

            .week,
            .grid {
                width: 100%;
                min-width: 0;
                grid-template-columns: repeat(7, minmax(0, 1fr));
            }

            .w {
                min-width: 0;
                padding: 8px 0;
                font-size: 11px;
                box-sizing: border-box;
            }

            .day {
                min-width: 0;
                min-height: 78px;
                padding: 4px;
                box-sizing: border-box;
            }

            .datebar {
                font-size: 11px;
                margin-bottom: 3px;
                align-items: center;
            }

            .datebar button {
                padding: 2px 5px;
                font-size: 11px;
                border-radius: 8px;
            }

            .today .datebar span {
                padding: 2px 6px;
            }

            /* 모바일 일정 카드는 요약 표시 */
            .event {
                margin: 2px 0;
                padding: 4px 5px;
                min-height: 0;
                border-radius: 6px;
            }

            .event .t {
                font-size: 10.5px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .event .m {
                display: none;
            }

            .badge {
                font-size: 9px;
                padding: 0 3px;
                margin-right: 3px;
            }

            /* 팝업 안의 입력칸은 모바일에서 1열 유지 */
            .dateRow,
            .mainRow,
            .subRow,
            .colorRow {
                grid-template-columns: 1fr;
                gap: 6px;
            }
        }


            /* ===== 모바일 팝업 최종 덮어쓰기: 입력칸 겹침/높이/너비 강제 보정 ===== */
            @media(max-width:900px) {
                .modal.open {
                    display: flex !important;
                    align-items: center !important;
                    justify-content: center !important;
                    padding: 10px !important;
                    overflow: auto !important;
                }

                .modal.open .panel {
                    width: min(94vw, 430px) !important;
                    max-height: 78dvh !important;
                    padding: 16px 18px !important;
                    border-radius: 16px !important;
                    overflow: auto !important;
                    box-sizing: border-box !important;
                }

                .modal.open .panel h2 {
                    margin: 0 0 12px !important;
                    font-size: 20px !important;
                }

                .modal.open .panel label {
                    font-size: 12px !important;
                    margin: 7px 0 4px !important;
                    line-height: 1.2 !important;
                }

                .modal.open .panel .field {
                    width: 100% !important;
                    min-width: 0 !important;
                    min-height: 38px !important;
                    padding: 7px 8px !important;
                    font-size: 13px !important;
                    border-radius: 8px !important;
                    box-sizing: border-box !important;
                }

                .modal.open .panel select.field {
                    min-height: 40px !important;
                    line-height: 1.2 !important;
                    padding: 7px 8px !important;
                }

                .modal.open .panel textarea.field {
                    min-height: 72px !important;
                }

                .modal.open .panel .dateRow,
                .modal.open .panel .mainRow,
                .modal.open .panel .subRow,
                .modal.open .panel .colorRow {
                    display: grid !important;
                    align-items: end !important;
                }

                .modal.open .panel .dateRow {
                    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) !important;
                    column-gap: 14px !important;
                    row-gap: 6px !important;
                }

                .modal.open .panel .mainRow {
                    grid-template-columns: 0.55fr 2fr 0.9fr !important;
                    column-gap: 10px !important;
                    row-gap: 6px !important;
                }

                .modal.open .panel .subRow {
                    grid-template-columns: 1.1fr 1.1fr 0.9fr !important;
                    column-gap: 10px !important;
                    row-gap: 6px !important;
                }

                .modal.open .panel .colorRow {
                    grid-template-columns: 1fr 1fr 1fr !important;
                    column-gap: 10px !important;
                    row-gap: 6px !important;
                }

                .modal.open .panel .dateRow div,
                .modal.open .panel .mainRow div,
                .modal.open .panel .subRow div,
                .modal.open .panel .colorRow div {
                    min-width: 0 !important;
                }

                .modal.open .panel .actions {
                    position: sticky !important;
                    bottom: 0 !important;
                    background: white !important;
                    margin-top: 14px !important;
                    padding-top: 10px !important;
                    border-top: 1px solid #e5e7eb !important;
                    z-index: 2 !important;
                }

                .modal.open .panel .actions button {
                    padding: 9px 12px !important;
                    font-size: 13px !important;
                }
            }

    </style>
</head>

<body>
    <div class="app">
        <div class="bar">
            <div class="left"><button class="nav" id="prev">&lt;</button>
                <h1 id="ym"></h1><button class="nav" id="next">&gt;</button><input type="month" id="picker"><button
                    id="today">오늘</button><span class="status" id="status">저장소 확인 중</span>
            </div>
            <div class="right"><input id="q" type="search" placeholder="교육명/주관부서/장소/담당자/목적 검색"><select id="cat">
                    <option value="">전체</option>
                    <option value="training">교육</option>
                    <option value="business_trip">출장</option>
                    <option value="annual_leave">연차</option>
                    <option value="company_issue">회사 이슈</option>
                    <option value="holiday">공휴일</option>
                    <option value="etc">기타</option>
                </select><button id="xls">엑셀 다운로드</button><button id="csv">CSV</button><button class="primary"
                    id="add">일정 추가</button></div>
        </div>
        <div class="hint">일정 표시는 교육명 아래에 주관부서 · 장소 / 담당자 · 목적 두 줄로 표시됩니다.</div>
        <div class="cal">
            <div class="week">
                <div class="w">SUN</div>
                <div class="w">MON</div>
                <div class="w">TUE</div>
                <div class="w">WED</div>
                <div class="w">THU</div>
                <div class="w">FRI</div>
                <div class="w">SAT</div>
            </div>
            <div class="grid" id="grid"></div>
        </div>
    </div>
    <div class="modal" id="modal">
        <div class="panel">
            <h2 id="mt">일정 추가</h2><input type="hidden" id="id"><input type="hidden" id="group_id"><input type="hidden"
                id="edit_mode">
            <div class="dateRow">
                <div><label>시작일</label><input class="field" type="date" id="start_d"></div>
                <div><label>종료일</label><input class="field" type="date" id="end_d"></div>
            </div>
            <div class="mainRow">
                <div><label>구분</label><select class="field" id="category">
                        <option value="training">교육</option>
                        <option value="business_trip">출장</option>
                        <option value="annual_leave">연차</option>
                        <option value="company_issue">회사 이슈</option>
                        <option value="etc">기타</option>
                    </select></div>
                <div><label>교육명/이슈</label><input class="field" id="title"></div>
                <div><label>장소</label><input class="field" id="place"></div>
            </div>
            <div class="subRow">
                <div><label>주관부서</label><input class="field" id="org_department" placeholder="예: HVAC역량육성팀"></div>
                <div><label>담당자</label><input class="field" id="owner"></div>
                <div><label>목적</label><select class="field" id="purpose">
                        <option value=""></option>
                        <option value="강사">강사</option>
                        <option value="운영">운영</option>
                        <option value="참관">참관</option>
                    </select></div>
            </div>
            <div class="colorRow">
                <div><label>배경색</label><input class="field" type="color" id="bg"></div>
                <div><label>글자색</label><input class="field" type="color" id="fc"></div>
                <div><label>테두리색</label><input class="field" type="color" id="bd"></div>
            </div><label>메모</label><textarea class="field" id="memo" rows="3"></textarea>
            <div class="modeHint" id="modeHint"></div>
            <div class="actions"><button class="danger" id="del">삭제</button>
                <div><button id="cancel">취소</button><button class="primary" id="save">저장</button></div>
            </div>
        </div>
    </div>
    <script>
        let events = [], holidays = {}, cur = new Date(), db = null, useDb = false; cur.setDate(1); const $ = x => document.getElementById(x), pad = n => String(n).padStart(2, '0'), key = d => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`, esc = s => String(s || '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m])); function lab(c) { return c === 'training' ? '교육' : c === 'business_trip' ? '출장' : c === 'annual_leave' ? '연차' : c === 'company_issue' ? '회사' : c === 'holiday' ? '공휴일' : '기타' } function norm(r) { let base = r.date || r.start_date || key(new Date()); return { id: r.id || crypto.randomUUID(), group_id: r.group_id || r.id || crypto.randomUUID(), date: base, start_date: r.start_date || base, end_date: r.end_date || r.start_date || base, title: r.title || '', owner: r.owner || '', place: r.place || '', category: r.category || 'training', org_department: r.org_department || '', purpose: r.purpose || '', bg_color: r.bg_color || '#fff', font_color: r.font_color || '#111827', border_color: r.border_color || '#d1d5db', memo: r.memo || '' } } function parts(a) { return a.filter(x => String(x || '').trim()).map(esc).join(' · ') } function dateList(s, e) { let a = new Date(s + 'T00:00:00'), b = new Date(e + 'T00:00:00'), out = []; for (let d = new Date(a); d <= b; d.setDate(d.getDate() + 1))out.push(key(d)); return out } function gkey(e) { return e.group_id || e.id } function overlap(e, ws, we) { return new Date(e.start_date + 'T00:00:00') <= we && new Date(e.end_date + 'T00:00:00') >= ws } async function init() { let init = []; try { init = await fetch('initial_events.json').then(r => r.json()) } catch (e) { } let c = window.APP_CONFIG || {}; useDb = !!(c.USE_SUPABASE && c.SUPABASE_URL && c.SUPABASE_ANON_KEY && window.supabase); if (useDb) { db = window.supabase.createClient(c.SUPABASE_URL, c.SUPABASE_ANON_KEY); $('status').textContent = 'Supabase 연결'; await loadDb(); db.channel('schedules').on(
